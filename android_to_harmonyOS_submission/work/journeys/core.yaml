    stable_id: action.detail.addToCart
    setup: ["theme:dark"]
    steps: [launch, "tap:snack.card.1"]
    assert: [screen.detail, "button.gradient:#86F7FA-to-#9B86FA", "button.height:40vp", "button.shape:pill"]

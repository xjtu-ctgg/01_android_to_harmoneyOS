schema_version: 1
application: Jetsnack
source_commit: 23e1421b72b602d80486777efbf24dd248abf3bb
defaults:
  cold_start: true
  theme: light
  locale: en-US
  screenshot: required
journeys:
  - id: core.feed
    stable_id: screen.feed
    steps: [launch]
    assert: [screen.feed, nav.feed, "Android's picks"]
    screenshot: feed-cold-start
  - id: core.search
    stable_id: screen.search
    steps: [launch, "tap:nav.search", "input:Apple", "wait:250ms"]
    assert: [screen.search, "5 items", Apples]
    screenshot: search-apple-results
  - id: core.cart
    stable_id: screen.cart
    steps: [launch, "tap:nav.cart"]
    assert: [screen.cart, "Order (3 items)", "$58.13"]
    screenshot: cart-initial
  - id: core.profile
    stable_id: screen.profile
    steps: [launch, "tap:nav.profile"]
    assert: [screen.profile, "This is currently work in progress"]
    screenshot: profile-empty
  - id: core.detail
    stable_id: screen.detail
    steps: [launch, "tap:snack.card.1"]
    assert: [screen.detail, Cupcake, "$2.99", detail.back]
    screenshot: detail-cupcake
  - id: core.public-app-test.navigate-all-screens
    stable_id: screen.profile
    steps: [launch, "tap:nav.search", "tap:nav.cart", "tap:nav.profile"]
    assert: [screen.profile, "Android's picks:visited", "Categories:visited", "Order (3 items):visited", "This is currently work in progress"]
    screenshot: public-app-test-navigation-profile
  - id: core.public-app-test.open-chips-detail
    stable_id: screen.detail
    steps: [launch, "tap:snack.card.15"]
    assert: [screen.detail, Chips, "Lorem ipsum", detail.back]
    screenshot: public-app-test-chips-detail
  - id: core.filter
    stable_id: overlay.filter
    steps: [launch, "tap:feed.filters.open"]
    assert: [overlay.filter, filter.close, Filters, "filter.chip.shadow:OUTER_DEFAULT_XS", "filter.chip.background:#FFFFFF"]
    screenshot: filter-initial
  - id: core.navigation.feed
    stable_id: nav.feed
    steps: [launch, "tap:nav.search", "tap:nav.feed"]
    assert: [screen.feed, "nav.feed:selected"]
    screenshot: navigation-feed
  - id: core.navigation.search
    stable_id: nav.search
    steps: [launch, "tap:nav.search"]
    assert: [screen.search, "nav.search:selected"]
    screenshot: navigation-search
  - id: core.navigation.cart
    stable_id: nav.cart
    steps: ["open_uri:https://jetsnack.example.com/home/cart"]
    assert: [screen.cart, "nav.cart:selected"]
    screenshot: navigation-cart-deep-link
  - id: core.navigation.profile
    stable_id: nav.profile
    steps: [launch, "tap:nav.profile"]
    assert: [screen.profile, "nav.profile:selected"]
    screenshot: navigation-profile
  - id: core.navigation.detail
    stable_id: nav.detail
    steps: [launch, "tap:snack.card.1", "tap:detail.back"]
    assert: [screen.feed, "route:return-origin"]
    screenshot: navigation-detail-return
  - id: core.navigation.filter
    stable_id: nav.filter
    steps: [launch, "tap:feed.filters.open", "tap:filter.close"]
    assert: [screen.feed, "overlay.filter:absent"]
    screenshot: navigation-filter-dismiss
  - id: core.feed.delivery.noop
    stable_id: action.delivery.address.expand
    steps: [launch, "tap:action.delivery.address.expand"]
    assert: [screen.feed, "state:unchanged"]
    screenshot: feed-delivery-noop
  - id: core.feed.collection.noop
    stable_id: action.feed.collection
    steps: [launch, "tap:action.feed.collection"]
    assert: [screen.feed, "state:unchanged"]
    screenshot: feed-collection-noop
  - id: core.filter.reset.noop
    stable_id: action.filter.reset
    steps: [launch, "tap:feed.filters.open", "tap:filter.lifestyle.sweet", "tap:filter.sort.rating", "tap:action.filter.reset"]
    assert: [overlay.filter, "filter.lifestyle.sweet:selected", "filter.sort.rating:selected", "action.filter.reset:enabled", "feed:data-unchanged"]
    screenshot: filter-reset-noop
  - id: core.filter.apply.noop
    stable_id: action.filter.applyToFeed
    steps: [launch, "tap:feed.filters.open", "tap:filter.lifestyle.sweet", "tap:action.filter.applyToFeed"]
    assert: [overlay.filter, "filter.lifestyle.sweet:selected", "filter.chip.selectedBackground:#8EF8FA", "filter.chip.shadow:OUTER_DEFAULT_XS", "feed:data-unchanged", "screen.feed:visible", "dismissCount:0"]
    screenshot: filter-visual-only
  - id: core.search.category.noop
    stable_id: action.search.category.select
    steps: [launch, "tap:nav.search", "tap:action.search.category.select"]
    assert: [screen.search, "state:unchanged"]
    screenshot: search-category-noop
  - id: interface.accessibility.search-category-card
    stable_id: action.search.category.select
    steps: [launch, "tap:nav.search"]
    assert: [screen.search, "action.search.category.select:button", "action.search.category.select:accessible-text"]
    screenshot: search-category-accessibility
  - id: core.search.result.add.noop
    stable_id: action.search.result.add
    steps: [launch, "tap:nav.search", "input:Apple", "wait:250ms", "tap:action.search.result.add"]
    assert: [screen.search, "cart:unchanged"]
    screenshot: search-add-noop
  - id: visual.search.result-button-gradient
    stable_id: action.search.result.add
    steps: [launch, "tap:nav.search", "input:Apple", "wait:250ms"]
    assert: [screen.search, "button.gradient:start-to-end", "button.shape:circle", "button.visualSize:36vp", "button.touchTarget:48vp"]
    screenshot: search-result-button-gradient
  - id: edge.search.result-add-expanded-hit-target-no-navigation
    stable_id: action.search.result.add
    steps: [launch, "tap:nav.search", "input:Apple", "wait:250ms", "tap_edge:action.search.result.add:right+5vp"]
    assert: [screen.search, "query:Apple", "5 items", "screen.detail:absent", "cart:unchanged", "action.search.result.add:clickable"]
    screenshot: search-add-expanded-hit-target-stays-on-results
  - id: core.cart.checkout.noop
    stable_id: action.cart.checkout
    steps: [launch, "tap:nav.cart", "tap:action.cart.checkout"]
    assert: [screen.cart, "state:unchanged"]
    screenshot: cart-checkout-noop
  - id: edge.cart.checkout-expanded-top-hit-target
    stable_id: action.cart.checkout
    steps: [launch, "tap:nav.cart", "tap_edge:action.cart.checkout:top-3vp"]
    assert: [screen.cart, "cart:unchanged", "screen.detail:absent", "action.cart.checkout:clickable", "touchTarget.height:48vp"]
    screenshot: cart-checkout-expanded-top-hit-target
  - id: visual.cart.checkout-gradient
    stable_id: action.cart.checkout
    steps: [launch, "tap:nav.cart"]
    assert: [screen.cart, "checkout.gradient:start-to-end", "checkout.button.height:40vp"]
    screenshot: cart-checkout-gradient
  - id: core.cart.swipe.noop
    stable_id: action.cart.swipeDismiss.persistence
    steps: [launch, "tap:nav.cart", "swipe_left:action.cart.swipeDismiss.persistence.5", "tap:nav.feed", "tap:nav.cart"]
    assert: [screen.cart, "hidden:5", "total:\"$58.13\""]
    screenshot: cart-swipe-persistence
  - id: edge.cart.swipe-below-threshold
    stable_id: action.cart.swipeDismiss.persistence
    steps: [launch, "tap:nav.cart", "swipe_left:action.cart.swipeDismiss.persistence.5:55vp:1000ms"]
    assert: [screen.cart, "hidden.5:false", "total:\"$58.13\""]
    screenshot: cart-swipe-below-threshold
  - id: edge.cart.swipe-at-threshold
    stable_id: action.cart.swipeDismiss.persistence
    steps: [launch, "tap:nav.cart", "swipe_left:action.cart.swipeDismiss.persistence.5:56vp:1000ms"]
    assert: [screen.cart, "hidden.5:true", "total:\"$58.13\""]
    screenshot: cart-swipe-at-threshold
  - id: edge.cart.swipe-fast-fling
    stable_id: action.cart.swipeDismiss.persistence
    steps: [launch, "tap:nav.cart", "swipe_left:action.cart.swipeDismiss.persistence.5:20vp:100ms"]
    assert: [screen.cart, "hidden.5:true", "dismiss.velocityThreshold:125vp/s"]
    screenshot: cart-swipe-fast-fling
  - id: visual.rtl.cart-swipe-progress
    stable_id: action.cart.swipeDismiss.persistence
    setup: ["locale:ar", "layout_direction:rtl", "viewport:360x800"]
    steps: [launch, "tap:nav.cart", "drag_hold_right:action.cart.swipeDismiss.persistence.5:45vp"]
    assert: [screen.cart, "translateX:45vp", "swipe.progress:0.125", "delete.icon:visible"]
    screenshot: cart-rtl-swipe-progress
  - id: edge.rtl.cart-swipe-at-threshold
    stable_id: action.cart.swipeDismiss.persistence
    setup: ["locale:ar", "layout_direction:rtl"]
    steps: [launch, "tap:nav.cart", "swipe_right:action.cart.swipeDismiss.persistence.5:56vp:1000ms"]
    assert: [screen.cart, "hidden.5:true", "total:\"$58.13\""]
    screenshot: cart-rtl-swipe-at-threshold
  - id: edge.rtl.cart-swipe-opposite-direction
    stable_id: action.cart.swipeDismiss.persistence
    setup: ["locale:ar", "layout_direction:rtl"]
    steps: [launch, "tap:nav.cart", "swipe_left:action.cart.swipeDismiss.persistence.5:100vp:1000ms"]
    assert: [screen.cart, "hidden.5:false", "translateX:0vp"]
    screenshot: cart-rtl-opposite-direction-ignored
  - id: visual.rtl.cart-checkout-physical-left-text
    stable_id: action.cart.checkout
    setup: ["viewport:360x800", "locale:ar", "layout_direction:rtl"]
    steps: [launch, "tap:nav.cart"]
    assert: [screen.cart, "checkout.button:logicalEndHalf", "checkout.text:physicalLeft", "checkout.text:CHECKOUT", "checkout.text.clipped:false"]
    screenshot: cart-rtl-checkout-physical-left-text
  - id: core.detail.add.noop
    stable_id: action.detail.addToCart
    steps: [launch, "tap:snack.card.1", "tap:action.detail.addToCart"]
    assert: [screen.detail, "cart:unchanged"]
    screenshot: detail-add-noop
  - id: edge.detail.add-expanded-bottom-hit-target
    stable_id: action.detail.addToCart
    steps: [launch, "tap:snack.card.1", "tap_edge:action.detail.addToCart:bottom+3vp"]
    assert: [screen.detail, "cart:unchanged", "detail.quantity:1", "action.detail.addToCart:clickable", "touchTarget.height:48vp"]
    screenshot: detail-add-expanded-bottom-hit-target
  - id: core.detail.related.noop
    stable_id: action.detail.related.select
    steps: [launch, "tap:snack.card.1", "tap:action.detail.related.select"]
    assert: [screen.detail, "state:unchanged"]
    screenshot: detail-related-noop
  - id: visual.detail.bottom-scroll-source-clearance
    stable_id: screen.detail
    setup: ["viewport:360x800", "navigation_bottom_inset:34vp"]
    steps: [launch, "tap:snack.card.1", "scroll_to:feed.collection.7", "scroll_down:nav.detail:400vp"]
    assert: [screen.detail, "content.bottomSpacer:64vp", "detail.bottomBar:visible", "navigationInset:34vp", "lastCollection.clipped:false", "overlap:none"]
    screenshot: detail-bottom-source-clearance

  # Adversarial state and visual cases approximate likely private evaluator paths.
  - id: edge.search.suggestions
    stable_id: search.input
    steps: [launch, "tap:nav.search", "focus:search.input"]
    assert: [screen.search, "Popular searches", search.suggestion.Cheese]
    screenshot: search-focused-suggestions
  - id: edge.search.no-results
    stable_id: search.input
    steps: [launch, "tap:nav.search", "input:zzzz-no-match", "wait:250ms"]
    assert: [screen.search, "No matches for “zzzz-no-match”", "Try broadening your search"]
    screenshot: search-no-results
  - id: edge.search.clear
    stable_id: search.clear
    steps: [launch, "tap:nav.search", "input:Apple", "wait:250ms", "tap:search.clear", "wait:250ms"]
    assert: [screen.search, "query:empty", "Popular searches"]
    screenshot: search-clear-to-suggestions
  - id: edge.search.clear-expanded-top-hit-target
    stable_id: search.clear
    steps: [launch, "tap:nav.search", "input:Apple", "wait:250ms", "tap_edge:search.clear:top-3vp", "wait:250ms"]
    assert: [screen.search, "query:empty", "search.focused:true", "display:Suggestions", "Popular searches", "screen.feed:absent"]
    screenshot: search-clear-expanded-top-hit-target
  - id: edge.search.case-insensitive
    stable_id: search.input
    steps: [launch, "tap:nav.search", "input:apple", "wait:250ms"]
    assert: [screen.search, "query:apple", "5 items", Apples, "Apple pie"]
    screenshot: search-lowercase-apple-results
  - id: edge.search.whitespace-is-query
    stable_id: search.input
    steps: [launch, "tap:nav.search", "input_codepoint:U+0020", "wait:250ms"]
    assert: [screen.search, "query:single-U+0020", "5 items", "Ice Cream Sandwich", "Apple sauce"]
    screenshot: search-space-query-results
  - id: edge.cart.increment
    stable_id: cart.quantity.increase.5
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5"]
    assert: [screen.cart, "quantity.5:3", "total:\"$63.12\""]
    screenshot: cart-incremented
  - id: edge.cart.quantity-persists-across-tabs
    stable_id: cart.quantity.increase.5
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:nav.feed", "tap:nav.cart"]
    assert: [screen.cart, "quantity.5:3", "total:\"$63.12\"", "nav.cart:selected"]
    screenshot: cart-quantity-preserved-after-tab-roundtrip
  - id: edge.cart.quantity-persists-after-rotation
    stable_id: screen.cart
    setup: ["viewport:360x800", "orientation:portrait"]
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "rotate:landscape"]
    assert: [screen.cart, "quantity.5:3", "total:\"$63.12\"", "nav.cart:selected", "overlap:none"]
    screenshot: cart-landscape-quantity-preserved
  - id: edge.process-restart.resets-cart-view-model
    stable_id: screen.cart
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", force_stop, cold_launch, "tap:nav.cart"]
    assert: [screen.cart, "quantity.5:2", "quantity.7:3", "quantity.9:1", "Order (3 items)", "total:\"$58.13\""]
    screenshot: cart-cold-process-state-reset
  - id: edge.cart.fifth-request-failure
    stable_id: cart.snackbar.error
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5"]
    assert: [screen.cart, "quantity.5:6", cart.snackbar.error]
    screenshot: cart-fifth-request-error
  - id: edge.cart.snackbar-auto-dismiss
    stable_id: screen.cart
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "wait:4100ms"]
    assert: [screen.cart, "quantity.5:6", "cart.snackbar.error:absent"]
    screenshot: cart-error-auto-dismissed
  - id: visual.cart.snackbar-source-geometry
    stable_id: cart.snackbar.error
    setup: ["viewport:360x800", "theme:light"]
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5"]
    assert: [screen.cart, "quantity.5:6", "snackbar.outerInset:12vp", "snackbar.minHeight:68vp", "snackbar.corner:50%", "snackbar.background:pageBackground", "snackbar.text:textSecondary", "snackbar.shadow:OUTER_DEFAULT_MD", "snackbar.host:scaffold-overlay", "snackbar.overlaps:checkout"]
    screenshot: cart-snackbar-source-geometry-light
  - id: visual.dark.cart-snackbar-source-geometry
    stable_id: cart.snackbar.error
    setup: ["viewport:360x800", "theme:dark"]
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5"]
    assert: [screen.cart, "snackbar.background:#121212", "snackbar.text:#FFFFFF", "snackbar.errorRed:absent", "snackbar.corner:50%", "snackbar.shadow:OUTER_DEFAULT_MD", "snackbar.horizontalInset:12vp"]
    screenshot: cart-snackbar-source-geometry-dark
  - id: edge.cart.snackbar-tap-does-not-dismiss
    stable_id: cart.snackbar.error
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "touch:cart.snackbar.error", "wait:100ms"]
    assert: [screen.cart, cart.snackbar.error, "quantity.5:6"]
    screenshot: cart-snackbar-still-visible-after-tap
  - id: edge.cart.snackbar-fifo-queue
    stable_id: cart.snackbar.error
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5"]
    assert: [screen.cart, "snackbar.message:increase-error", "snackbar.queue:decrease-error", "quantity.5:2"]
    screenshot: cart-first-snackbar-with-second-queued
  - id: edge.cart.snackbar-fifo-advances
    stable_id: cart.snackbar.error
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "wait:4100ms"]
    assert: [screen.cart, "snackbar.message:decrease-error", "snackbar.queue:empty", "quantity.5:2"]
    screenshot: cart-second-snackbar-after-fifo
  - id: edge.cart.snackbar-shared-across-tabs
    stable_id: cart.snackbar.error
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:nav.search"]
    assert: [screen.search, cart.snackbar.error, "snackbar.message:increase-error", "snackbar.host:shared-tab-scaffold", "nav.search:selected"]
    screenshot: search-with-cart-snackbar-overlay
  - id: edge.detail.current-snackbar-host-disposed
    stable_id: screen.detail
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:action.cart.swipeDismiss.persistence.5"]
    assert: [screen.detail, "cart.snackbar.error:absent", "snackbar.queue:decrease-error", "nav.feed:absent"]
    screenshot: detail-with-current-snackbar-disposed
  - id: edge.detail.pending-snackbar-resumes-on-return
    stable_id: cart.snackbar.error
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.increase.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:cart.quantity.decrease.5", "tap:action.cart.swipeDismiss.persistence.5", system_back]
    assert: [screen.cart, "snackbar.message:decrease-error", "snackbar.queue:empty", "quantity.5:2", "nav.cart:selected"]
    screenshot: cart-pending-snackbar-resumed-after-detail
  - id: edge.cart.decrement-removes-line
    stable_id: cart.quantity.decrease.9
    steps: [launch, "tap:nav.cart", "tap:cart.quantity.decrease.9"]
    assert: [screen.cart, "Order (2 items)", "cart.quantity.decrease.9:absent"]
    screenshot: cart-line-removed-at-one
  - id: edge.cart.remove-all-lines
    stable_id: screen.cart
    steps: [launch, "tap:nav.cart", "tap:action.cart.remove.5", "tap:action.cart.remove.7", "tap:action.cart.remove.9"]

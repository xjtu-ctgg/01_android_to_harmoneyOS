    stable_id: detail.seeMore
    steps: [launch, "tap:snack.card.1", "tap:detail.seeMore"]
    assert: [screen.detail, "SEE LESS", "details:expanded"]
    screenshot: detail-expanded
  - id: edge.detail.see-more-expanded-bottom-hit-target
    stable_id: detail.seeMore
    steps: [launch, "tap:snack.card.1", "tap_edge:detail.seeMore:bottom+7vp"]
    assert: [screen.detail, "SEE LESS", "details:expanded", "touchTarget.height:48vp"]
    screenshot: detail-see-more-expanded-bottom-hit-target
  - id: edge.detail.back-expanded-left-hit-target
